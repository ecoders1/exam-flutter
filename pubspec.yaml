name: exit_exam_ethiopia
description: AI-Powered Offline Exit Exam Platform for Ethiopia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # Local Storage / Offline
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  sqflite: ^2.3.2
  path_provider: ^2.1.2

  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  fluttertoast: ^8.2.4
  awesome_dialog: ^3.1.0

  # File Handling
  file_picker: ^8.0.3
  dio: ^5.4.3+1
  http: ^1.2.1

  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.2.0
  device_info_plus: ^10.1.0
  crypto: ^3.0.3

  # PDF — updated to version compatible with intl 0.20.x
  syncfusion_flutter_pdf: ^31.1.19
  printing: ^5.12.0

  # Image
  image_picker: ^1.1.2

  # Connectivity
  connectivity_plus: ^6.0.3

  # Notifications
  flutter_local_notifications: ^17.1.2

  # URL Launcher
  url_launcher: ^6.2.5

  # Intl — pinned to match flutter_localizations in SDK
  intl: '0.20.2'

  # Shared Prefs
  shared_preferences: ^2.2.3

  # App Update
  package_info_plus: ^8.0.0

  # Telegram / Web
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/flags/
  fonts:
    - family: NotoSansEthiopic
      fonts:
        - asset: assets/fonts/NotoSansEthiopic-Regular.ttf
        - asset: assets/fonts/NotoSansEthiopic-Bold.ttf
          weight: 700
